<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritchie's Audio Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="player-container">
        <div class="header">
            <span class="badge">Playing Now</span>
            <h2 id="songTitle">PlayTracK</h2>
        </div>
        
        <audio id="myAudio" src="audio1.mp3"></audio>

        <div id="timeDisplay">00:00</div>

        <div class="playback-controls">
            <button id="prevBtn" class="nav-btn">«</button>
            <button id="playPauseBtn" class="main-btn">▶</button>
            <button id="nextBtn" class="nav-btn">»</button>
        </div>

        <hr>

        <div class="extra-controls">
            <div class="btn-row">
                <button id="muteBtn">Mute</button>
                <button id="loopBtn">Loop</button>
            </div>

            <div class="slider-box">
                <label>Volume</label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1">
            </div>

            <div class="slider-box">
                <label>Speed: <span id="speedVal">1</span>x</label>
                <input type="range" id="speedSlider" min="0.5" max="2" step="0.25" value="1">
            </div>
        </div>
    </div>

    <script src="logic.js"></script>
</body>
</html>
